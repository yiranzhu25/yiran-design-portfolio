<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yiran Zhu — Product Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script>(function(){var s=localStorage.getItem('pf-theme');var d=window.matchMedia('(prefers-color-scheme:dark)').matches;document.documentElement.setAttribute('data-theme',s||(d?'dark':'light'));})();</script>
</head>
<body>

  <!-- ── Header ───────────────────────────────────────── -->
  <header class="pf-header">
    <a href="password.html" class="pf-wordmark">Yiran Zhu <span>Product Designer</span></a>
    <div class="pf-header-controls">
      <button class="pf-iconbtn" id="theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- ── Mobile nav ─────────────────────────────────────── -->
  <div class="pf-topbar">
    <a href="password.html" class="pf-wordmark">Yiran Zhu</a>
    <button class="pf-iconbtn" id="theme-toggle-mobile" aria-label="Toggle theme">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>

  <!-- ── Password gate ─────────────────────────────── -->
  <main class="pw-gate">
    <div class="pw-gate-card">

      <!-- Lock icon -->
      <div class="pw-lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 20 20" fill="none">
          <path d="M15.0002 7.08333H14.1668V5.41667C14.1668 3.11667 12.3002 1.25 10.0002 1.25C7.70016 1.25 5.8335 3.11667 5.8335 5.41667V7.08333H5.00016C4.0835 7.08333 3.3335 7.83333 3.3335 8.75V17.0833C3.3335 18 4.0835 18.75 5.00016 18.75H15.0002C15.9168 18.75 16.6668 18 16.6668 17.0833V8.75C16.6668 7.83333 15.9168 7.08333 15.0002 7.08333ZM7.50016 5.41667C7.50016 4.03333 8.61683 2.91667 10.0002 2.91667C11.3835 2.91667 12.5002 4.03333 12.5002 5.41667V7.08333H7.50016V5.41667ZM15.0002 17.0833H5.00016V8.75H15.0002V17.0833ZM10.0002 14.5833C10.9168 14.5833 11.6668 13.8333 11.6668 12.9167C11.6668 12 10.9168 11.25 10.0002 11.25C9.0835 11.25 8.3335 12 8.3335 12.9167C8.3335 13.8333 9.0835 14.5833 10.0002 14.5833Z" fill="currentColor" opacity="0.5"/>
        </svg>
      </div>

      <!-- Message + LinkedIn inline -->
      <p class="pw-nda-text">This portfolio is password protected. Reach out on LinkedIn to get access. <a href="https://www.linkedin.com/in/yiranzhu/" target="_blank" class="pw-linkedin-link" aria-label="LinkedIn"><img src="img/InBug-Black.png" alt="LinkedIn"></a></p>

      <!-- Password input -->
      <div class="pw-input-group">
        <input
          type="password"
          id="site-pw-input"
          class="pw-input"
          placeholder="Enter password"
          autocomplete="off"
        >
        <p class="pw-error" id="site-pw-error">Wrong password</p>
      </div>

      <!-- Unlock button -->
      <button class="pf-btn pf-btn--primary" id="site-pw-submit">
        Unlock and View
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3.03841 7.58334H9.55425L6.70758 10.43C6.48008 10.6575 6.48008 11.0308 6.70758 11.2583C6.93508 11.4858 7.30258 11.4858 7.53008 11.2583L11.3742 7.41417C11.6017 7.18667 11.6017 6.81917 11.3742 6.59167L7.53591 2.74167C7.30841 2.51417 6.94091 2.51417 6.71341 2.74167C6.48591 2.96917 6.48591 3.33667 6.71341 3.56417L9.55425 6.41667H3.03841C2.71758 6.41667 2.45508 6.67917 2.45508 7C2.45508 7.32084 2.71758 7.58334 3.03841 7.58334Z" fill="currentColor"/>
        </svg>
      </button>

    </div>
  </main>

  <script src="main.js"></script>
</body>
</html>
