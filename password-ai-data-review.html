  <!-- ── Password gate ─────────────────────────────── -->
  <main class="pw-gate">
    <div class="pw-gate-card">

      <!-- Lock icon -->
      <div class="pw-lock-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 20 20" fill="none">
          <path d="M15.0002 7.08333H14.1668V5.41667C14.1668 3.11667 12.3002 1.25 10.0002 1.25C7.70016 1.25 5.8335 3.11667 5.8335 5.41667V7.08333H5.00016C4.0835 7.08333 3.3335 7.83333 3.3335 8.75V17.0833C3.3335 18 4.0835 18.75 5.00016 18.75H15.0002C15.9168 18.75 16.6668 18 16.6668 17.0833V8.75C16.6668 7.83333 15.9168 7.08333 15.0002 7.08333ZM7.50016 5.41667C7.50016 4.03333 8.61683 2.91667 10.0002 2.91667C11.3835 2.91667 12.5002 4.03333 12.5002 5.41667V7.08333H7.50016V5.41667ZM15.0002 17.0833H5.00016V8.75H15.0002V17.0833ZM10.0002 14.5833C10.9168 14.5833 11.6668 13.8333 11.6668 12.9167C11.6668 12 10.9168 11.25 10.0002 11.25C9.0835 11.25 8.3335 12 8.3335 12.9167C8.3335 13.8333 9.0835 14.5833 10.0002 14.5833Z" fill="#6B7280"/>
        </svg>
      </div>

      <!-- NDA message + LinkedIn inline -->
      <p class="pw-nda-text">This project is under NDA. Reach out on LinkedIn to unlock. <a href="https://www.linkedin.com/in/yiranzhu/" target="_blank" class="pw-linkedin-link" aria-label="LinkedIn"><img src="img/InBug-Black.png" alt="LinkedIn"></a></p>

      <!-- Password input -->
      <div class="pw-input-group">
        <input
          type="password"
          id="pw-input"
          class="pw-input"
          placeholder="Enter password"
          autocomplete="off"
        >
        <p class="pw-error" id="pw-error">Wrong password</p>
      </div>

      <!-- Unlock button -->
      <button class="btn-dark" id="pw-submit">
        Unlock and View
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3.03841 7.58334H9.55425L6.70758 10.43C6.48008 10.6575 6.48008 11.0308 6.70758 11.2583C6.93508 11.4858 7.30258 11.4858 7.53008 11.2583L11.3742 7.41417C11.6017 7.18667 11.6017 6.81917 11.3742 6.59167L7.53591 2.74167C7.30841 2.51417 6.94091 2.51417 6.71341 2.74167C6.48591 2.96917 6.48591 3.33667 6.71341 3.56417L9.55425 6.41667H3.03841C2.71758 6.41667 2.45508 6.67917 2.45508 7C2.45508 7.32084 2.71758 7.58334 3.03841 7.58334Z" fill="#fff"/>
        </svg>
      </button>

    </div>
  </main>

  <script>
    // ── Contact dropdown ────────────────────────────────
    var contactToggle   = document.getElementById('contact-toggle');
    var contactDropdown = document.getElementById('contact-dropdown');
    if (contactToggle && contactDropdown) {
      contactToggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = contactDropdown.classList.toggle('open');
        contactToggle.setAttribute('aria-expanded', open);
        contactDropdown.setAttribute('aria-hidden', !open);
      });
      document.addEventListener('click', function() {
        contactDropdown.classList.remove('open');
        contactToggle.setAttribute('aria-expanded', 'false');
        contactDropdown.setAttribute('aria-hidden', 'true');
      });
      contactDropdown.addEventListener('click', function(e) { e.stopPropagation(); });
    }

    // ── Hamburger menu ──────────────────────────────────
    var hamburgerBtn = document.getElementById('hamburger-btn');
    var navDropdown  = document.getElementById('nav-dropdown');
    if (hamburgerBtn && navDropdown) {
      hamburgerBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        var open = navDropdown.classList.toggle('open');
        hamburgerBtn.setAttribute('aria-expanded', open);
        navDropdown.setAttribute('aria-hidden', !open);
      });
      document.addEventListener('click', function() {
        navDropdown.classList.remove('open');
        hamburgerBtn.setAttribute('aria-expanded', 'false');
        navDropdown.setAttribute('aria-hidden', 'true');
      });
      navDropdown.addEventListener('click', function(e) { e.stopPropagation(); });
    }

    // ── Email copy ──────────────────────────────────────
    document.querySelectorAll('.copy-email').forEach(function(link) {
      var tooltip = document.createElement('span');
      tooltip.className = 'email-tooltip';
      tooltip.textContent = 'Copied';
      link.appendChild(tooltip);
      link.addEventListener('click', function(e) {
        e.preventDefault();
        var email = this.dataset.email;
        navigator.clipboard.writeText(email).then(function() {
          link.classList.add('copied');
          setTimeout(function() { link.classList.remove('copied'); }, 1500);
        });
      });
    });

    // ── Password gate ───────────────────────────────────
    var pwInput  = document.getElementById('pw-input');
    var pwSubmit = document.getElementById('pw-submit');
    var pwError  = document.getElementById('pw-error');

    function tryUnlock() {
      if (pwInput.value === '2026') {
        window.location.href = 'case-study-ai-data-review.html';
      } else {
        pwInput.classList.add('error');
        pwError.classList.add('visible');
        pwInput.focus();
      }
    }

    pwSubmit.addEventListener('click', tryUnlock);
    pwInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') tryUnlock();
    });
    pwInput.addEventListener('input', function() {
      pwInput.classList.remove('error');
      pwError.classList.remove('visible');
    });
  </script>
</body>
