<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pipeline Flow</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0D0F1A;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 24px 80px;
}

.wrapper {
  width: 100%;
  max-width: 1380px;
}

/* ═══════════════════════════════════════════════
   SHARED 5-COLUMN GRID
   All three rows (team, headers, cards) share the
   same grid definition so columns stay in lockstep
   at every viewport width.
   ═══════════════════════════════════════════════ */
.team-row,
.headers-row,
.cards-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 14px;
}

.team-row    { margin-bottom: 12px; }
.headers-row { margin-bottom: 12px; }

/* ── Team dot indicators ─────────────────────── */
.team-col {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 2px;
}

.tdot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tdot.p { background: #7B5CF5; box-shadow: 0 0 6px rgba(123,92,245,0.65); }
.tdot.g { background: #3EFFA0; box-shadow: 0 0 6px rgba(62,255,160,0.65); }

.tname {
  font-size: 12px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
}

/* ── Stage header pills ──────────────────────── */
.stage-hdr {
  background: #252836;
  border-radius: 8px;
  text-align: center;
  padding: 9px 8px;
  font-size: 11px;
  font-weight: 500;
  color: rgba(255,255,255,0.82);
  /* width is governed by the same 5-col grid as cards */
}

/* ── Base card ───────────────────────────────── */
.cards-grid { position: relative; }

.card {
  background: #1A1D2E;
  border-radius: 14px;
  padding: 13px;
  border: 1px solid rgba(255,255,255,0.065);
  position: relative;
}

/* Card toolbar */
.card-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 11px;
}

.bar-icon {
  width: 26px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.bar-btn {
  background: #1A1D2E;
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 16px;
  padding: 4px 11px;
  font-size: 9.5px;
  font-weight: 600;
  color: rgba(255,255,255,0.8);
  display: flex;
  align-items: center;
  gap: 5px;
}

/* ══════════════════════════════════════════════
   STAGE 1 — Initiate
   ══════════════════════════════════════════════ */
.s1-inputs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 10px 2px 6px;
}

.input-field {
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: 7px;
  padding: 9px 12px;
  font-size: 11px;
  color: rgba(255,255,255,0.32);
  background: transparent;
  user-select: none;
}

/* ══════════════════════════════════════════════
   STAGE 2 — Data Review
   ══════════════════════════════════════════════ */
.s2-body {
  display: flex;
  gap: 9px;
  align-items: stretch;
}

.doc-panel {
  flex: 1.35;
  background: #20233A;
  border-radius: 8px;
  padding: 9px 8px;
  display: flex;
  flex-direction: column;
  gap: 4.5px;
}

/* doc text lines */
.dl {
  height: 4px;
  border-radius: 2px;
  background: rgba(255,255,255,0.1);
  flex-shrink: 0;
}
.dl.f  { width: 100%; }
.dl.e  { width: 85%;  }
.dl.m  { width: 70%;  }
.dl.s  { width: 55%;  }

.dl.hl {
  background: rgba(123, 92, 245, 0.42);
  position: relative;
  overflow: hidden;
}
.dl.hl::after {
  content: '';
  position: absolute;
  top: 0; left: -80%; width: 50%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(160,120,255,0.72), transparent);
  animation: doc-sweep 2.6s ease-in-out infinite;
}
@keyframes doc-sweep {
  0%  { left: -80%; }
  55% { left: 130%; }
  100%{ left: 130%; }
}

.pills-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 7px;
  justify-content: space-around;
}

/* ══════════════════════════════════════════════
   STAGE 3 — Map
   ══════════════════════════════════════════════ */
.s3-map-area {
  display: flex;
  gap: 8px;
  margin-bottom: 10px;
  align-items: flex-start;
}
.s3-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.s3-table-wrap {
  background: #20233A;
  border-radius: 8px;
  padding: 8px;
}
.s3-trow { display: flex; gap: 5px; margin-bottom: 4px; }
.s3-trow:last-child { margin-bottom: 0; }
.s3-th { flex:1; height:12px; border-radius:3px; background:rgba(62,255,160,0.22); }
.s3-td { flex:1; height:9px;  border-radius:2px; background:rgba(255,255,255,0.08); }

/* ══════════════════════════════════════════════
   STAGE 4 — New Set Up
   ══════════════════════════════════════════════ */
.s4-body { padding-top: 2px; }

.select-row {
  display: flex;
  gap: 7px;
  margin-bottom: 10px;
}
.select-pill {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.13);
  border-radius: 7px;
  padding: 7px 9px;
  font-size: 9px;
  font-weight: 500;
  color: rgba(255,255,255,0.45);
  letter-spacing: 0.07em;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sel-arrow { opacity: 0.5; font-size: 8px; }

.s4-pills { display: flex; flex-direction: column; gap: 7px; }

/* ══════════════════════════════════════════════
   STAGE 5 — Approve All
   ══════════════════════════════════════════════ */
.s5-usd-block {
  background: #20233A;
  border-radius: 8px;
  padding: 9px 10px;
  margin-bottom: 10px;
}
.usd-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.usd-row:last-child { margin-bottom: 0; }

.usd-bar {
  width: 34px; height: 13px;
  border-radius: 4px;
  background: rgba(62,255,160,0.28);
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
}
.usd-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -80%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(62,255,160,0.55), transparent);
  animation: usd-sweep 1.9s ease-in-out infinite;
}
@keyframes usd-sweep {
  0%  { left: -80%; }
  65% { left: 130%; }
  100%{ left: 130%; }
}

.usd-amt {
  font-size: 10px;
  font-weight: 700;
  font-family: 'SF Mono', 'Fira Code', monospace;
  white-space: nowrap;
}
.usd-pos { color: #3EFFA0; }
.usd-neg { color: #FF6B6B; }

.s5-pills-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}

.s5-table-wrap { background: #20233A; border-radius: 8px; padding: 8px; }
.s5-trow { display: flex; gap: 5px; margin-bottom: 4px; }
.s5-trow:last-child { margin-bottom: 0; }
.s5-th { flex:1; height:12px; border-radius:3px; background:rgba(62,255,160,0.22); }
.s5-td { flex:1; height:9px;  border-radius:2px; background:rgba(255,255,255,0.08); }

/* ══════════════════════════════════════════════
   GENERIC PILL
   ══════════════════════════════════════════════ */
.pill {
  background: #FFFFFF;
  border-radius: 6px;
  padding: 6px 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  min-height: 26px;
}
.pill.g-fill {
  background: rgba(62,255,160,0.13);
  border: 1px solid rgba(62,255,160,0.27);
}
.pill.g-fill .pill-line { background: rgba(62,255,160,0.38); }
.pill.small  { padding: 5px 7px; min-height: 22px; }

.pdot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.pdot.p { background: #7B5CF5; box-shadow: 0 0 5px rgba(123,92,245,0.8); }
.pdot.g { background: #3EFFA0; box-shadow: 0 0 5px rgba(62,255,160,0.8); }

.pill-line {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: rgba(26,29,46,0.13);
}

/* ══════════════════════════════════════════════
   SVG CONNECTION LAYER
   All animation @keyframes are injected dynamically
   by buildLines() so each path gets a unique rule
   keyed to its exact measured length.
   ══════════════════════════════════════════════ */
.conn-svg {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: visible;
  z-index: 20;
}
</style>
</head>
<body>
<div class="wrapper">

  <!-- ══════════════════════════════════════════

                  fill="rgba(255,255,255,0.88)" stroke="rgba(255,255,255,0.3)" stroke-width="0.3"/>
          </svg>

<script>
/* ─── Dynamic animation stylesheet ───────────────────────────────────────
   Each path gets its own @keyframes rule keyed to its measured getTotalLength(),
   so the pulse segment travels exactly once across each path per cycle.
   The style element is rebuilt on every buildLines() call so resize
   events don't accumulate stale rules.
   ────────────────────────────────────────────────────────────────────── */
let _animEl  = null;
let _animCSS = '';
let _uid     = 0;

const PURPLE = '#9747FF';
const GREEN  = '#3EFFA0';

function buildLines() {
  /* ── Teardown previous run ── */
  if (_animEl) _animEl.remove();
  _animEl  = document.createElement('style');
  document.head.appendChild(_animEl);
  _animCSS = '';
  _uid     = 0;

  const svg  = document.getElementById('conn-svg');
  const grid = document.getElementById('cards-grid');
  const gr   = grid.getBoundingClientRect();
  svg.innerHTML = '';

  /* ── SVG Defs: soft glow filters for pulse highlight ── */
  const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
  defs.innerHTML = `
    <filter id="glow-p" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-g" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;
  svg.appendChild(defs);

  /* ── Helpers ── */
  function R(el) {
    const b = el.getBoundingClientRect();
    return {
      l:  b.left   - gr.left,
      t:  b.top    - gr.top,
      r:  b.right  - gr.left,
      b:  b.bottom - gr.top,
      cx: b.left   - gr.left + b.width  / 2,
      cy: b.top    - gr.top  + b.height / 2,
    };
  }

  function mkPath(d, stroke, opacity, extra) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d);
    p.setAttribute('stroke', stroke);
    p.setAttribute('stroke-width', '1');
    p.setAttribute('fill', 'none');
    p.setAttribute('stroke-opacity', opacity);
    if (extra) Object.entries(extra).forEach(([k, v]) => p.setAttribute(k, v));
    return p;
  }

  /*
   * drawLine()
   * Two-layer solid-line system per the Solid Path Flow spec:
   *
   *   Layer 1 – Base path  : solid, 0.25 opacity. Shows the full route at rest.
   *   Layer 2 – Pulse path : solid round-capped segment (18–55 px) that travels
   *             the full path length once per `duration` seconds.  A glow filter
   *             broadens the antialiased round caps into a soft gradient-like fade,
   *             matching the stop spec (0% → peak at 50% → 0% at 60–100%).
   *
   *   addStartDot – paint a 2.5 px source marker at (x1, y1) only.
   *                 No dot is placed at the destination end.
   */
  function drawLine(d, x1, y1, color, filterId, duration, delay, addStartDot) {
    /* 1 · Base */
    svg.appendChild(mkPath(d, color, '0.25'));

    /* 2 · Pulse */
    const pulse = mkPath(d, color, '1', {
      'stroke-linecap': 'round',
      'filter': `url(#${filterId})`
    });
    svg.appendChild(pulse);

    const len = pulse.getTotalLength() || 200;
    const seg = Math.max(18, Math.min(55, len * 0.18));
    pulse.setAttribute('stroke-dasharray', `${seg} ${len + 1}`);

    const name = `p${++_uid}`;
    _animCSS += `@keyframes ${name}{from{stroke-dashoffset:${(len + seg).toFixed(1)}}to{stroke-dashoffset:0}}`;
    pulse.style.animation = `${name} ${duration}s ${delay}s linear infinite`;

    /* 3 · Source dot (left / start end only — no right-end dot) */
    if (addStartDot) {
      const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', x1);
      dot.setAttribute('cy', y1);
      dot.setAttribute('r',  '2.5');
      dot.setAttribute('fill', color);
      dot.setAttribute('opacity', '0.55');
      svg.appendChild(dot);
    }
  }

  /* Standard horizontal S-bezier */
  function hBez(x1, y1, x2, y2, color, fId, dur, dly, dot) {
    const cp = (x2 - x1) * 0.5;
    drawLine(`M${x1} ${y1} C${x1+cp} ${y1},${x2-cp} ${y2},${x2} ${y2}`,
             x1, y1, color, fId, dur, dly, dot);
  }

  /*
   * topArc()  — routes OVER the top of an intermediate card.
   * apex is a negative y-coordinate (above the cards-grid top edge).
   * The SVG has overflow:visible so the arc is visible in the header area.
   */
  function topArc(x1, y1, x2, y2, apex, color, fId, dur, dly) {
    drawLine(`M${x1} ${y1} C${x1} ${apex},${x2} ${apex},${x2} ${y2}`,
             x1, y1, color, fId, dur, dly, true);
  }

  /* ══════════════════════════════════════════════════════════════════
     WITHIN S2 (Data review): doc-highlight lines → right pills
     Short purple curves, no source dot (origin mid-document).
     ══════════════════════════════════════════════════════════════════ */
  const hls  = [0,1,2,3].map(i => document.getElementById('hl'+i));
  const s2ps = [0,1,2,3].map(i => document.getElementById('s2p'+i));
  hls.forEach((hl, i) => {
    if (!hl || !s2ps[i]) return;
    const h = R(hl), p = R(s2ps[i]);
    hBez(h.r, h.cy, p.l, p.cy, PURPLE, 'glow-p', 0.9, i * 0.18, false);
  });

  /* ══════════════════════════════════════════════════════════════════
     WITHIN S3 (Map): left green pills → right green pills
     ══════════════════════════════════════════════════════════════════ */
  const s3ls = [0,1,2].map(i => document.getElementById('s3l'+i));
  const s3rs = [0,1,2].map(i => document.getElementById('s3r'+i));
  s3ls.forEach((lEl, i) => {
    if (!lEl || !s3rs[i]) return;
    const l = R(lEl), rv = R(s3rs[i]);
    hBez(l.r, l.cy, rv.l, rv.cy, GREEN, 'glow-g', 0.75, i * 0.12, false);
  });

  /* ══════════════════════════════════════════════════════════════════
     S2 pills → S4 pills  (purple)
     Arc ABOVE card S3 — four lines fan from –42 to –72 px above the
     grid top so they are clearly distinct as they crest over S3.
     ══════════════════════════════════════════════════════════════════ */
  const s4ps = [0,1,2,3].map(i => document.getElementById('s4p'+i));
  s2ps.forEach((pEl, i) => {
    if (!pEl || !s4ps[i]) return;
    const p = R(pEl), t = R(s4ps[i]);
    topArc(p.r, p.cy, t.l, t.cy,
           -(42 + i * 10),      /* apex: –42, –52, –62, –72 */
           PURPLE, 'glow-p', 2.0, i * 0.28);
  });

  /* ══════════════════════════════════════════════════════════════════
     S4 pills → S5 pills  (purple, short horizontal hop)
     ══════════════════════════════════════════════════════════════════ */
  const s5ps = [0,1,2,3].map(i => document.getElementById('s5p'+i));
  s4ps.forEach((pEl, i) => {
    if (!pEl || !s5ps[i]) return;
    const p = R(pEl), t = R(s5ps[i]);
    hBez(p.r, p.cy, t.l, t.cy, PURPLE, 'glow-p', 1.4, i * 0.18, true);
  });

  /* ══════════════════════════════════════════════════════════════════
     S3 table → S5 table  (green, large bottom arc — three fanned lines)
     ══════════════════════════════════════════════════════════════════ */
  const s3t = R(document.getElementById('s3-table'));
  const s5t = R(document.getElementById('s5-table'));
  [-12, 0, 12].forEach((off, i) => {
    const x1 = s3t.cx + off, y1 = s3t.b;
    const x2 = s5t.cx + off, y2 = s5t.b;
    const drop = 50 + i * 9;
    drawLine(`M${x1} ${y1} C${x1} ${y1+drop},${x2} ${y2+drop},${x2} ${y2}`,
             x1, y1, GREEN, 'glow-g', 2.0, i * 0.15, true);
  });

  /* ── Flush all collected @keyframes into the style element ── */
  _animEl.textContent = _animCSS;
}

window.addEventListener('load', buildLines);
window.addEventListener('resize', () => {
  clearTimeout(window._rt);
  window._rt = setTimeout(buildLines, 90);
});
</script>
</body>
